server:
  port: 8083

eureka:
  instance:
    hostname: localhost


spring:
  cloud:
    gateway:
      routes:
        - id: backend
          uri: lb://BACKEND
          predicates:
            - Path=/user/**
          filters:
            - AuthenticationFilter
        - id: AuthenticationService
          uri: lb://AuthenticationService
          predicates:
            - Path=/auth/**
        - id: CONTACT-SERVICE
          uri: lb://CONTACT-SERVICE
          predicates:
            - Path=/contact/**
          filters:
            - AuthenticationFilter
  application:
    name: API-GATEWAY